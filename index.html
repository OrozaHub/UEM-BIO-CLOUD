<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UEM Bio Cloud - Gerenciador 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjyzOxYxC_Y1KZNX2rgepgnMJexGWGUJQ",
            authDomain: "uem-bio-aulas.firebaseapp.com",
            projectId: "uem-bio-aulas",
            storageBucket: "uem-bio-aulas.firebasestorage.app",
            messagingSenderId: "186511184351",
            appId: "1:186511184351:web:5fa845fde22962d25ff46a",
            measurementId: "G-WZEGSF3MEH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        window.db = db;
        window.disciplinasGlobal = [];

        const initFirebase = async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                enableIndexedDbPersistence(db).catch((err) => {
                    console.warn("Persistência offline não disponível:", err.code);
                });
            } catch (error) {
                console.error("Erro na persistência:", error);
            }
        };

        initFirebase();

        onAuthStateChanged(auth, async (user) => {
            const statusDot = document.getElementById('dbStatus');
            if (user) {
                if (statusDot) {
                    statusDot.classList.remove('bg-slate-300', 'bg-red-500');
                    statusDot.classList.add('bg-green-500');
                }
                try {
                    const querySnapshot = await getDocs(collection(db, "disciplinas_2026"));
                    window.disciplinasGlobal = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if(window.initGrid) window.initGrid();
                } catch (e) {
                    console.error("Erro Firestore:", e);
                    if (statusDot) statusDot.classList.add('bg-red-500');
                }
            } else {
                signInAnonymously(auth).catch(err => {
                    console.error("Falha login anônimo:", err);
                    if (statusDot) statusDot.classList.add('bg-red-500');
                });
            }
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --cell-min-height: 90px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .grid-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 12px;
        }

        .timetable-grid { 
            display: grid; 
            grid-template-columns: 100px repeat(5, 1fr); 
            gap: 1px; 
            background-color: #e2e8f0; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #e2e8f0;
            min-width: 850px; /* Garante estrutura na exportação */
        }
        
        @media (max-width: 768px) {
            .timetable-grid { 
                min-width: 750px;
                grid-template-columns: 80px repeat(5, 1fr); 
            }
        }

        .cell { 
            background-color: white; 
            min-height: var(--cell-min-height); 
            padding: 4px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            position: relative; 
        }
        
        .cell.header { 
            background-color: #0f172a; 
            color: white; 
            font-weight: 800; 
            min-height: 50px; 
            text-transform: uppercase; 
            font-size: 0.65rem; 
            letter-spacing: 0.05em;
        }

        .cell.time-label { 
            background-color: #f8fafc; 
            font-weight: 700; 
            color: #64748b; 
            font-size: 0.7rem; 
            border-right: 1px solid #e2e8f0; 
        }

        .discipline-card { 
            width: 100%; height: 100%; padding: 6px 4px; border-radius: 4px; 
            display: flex; flex-direction: column; justify-content: center; gap: 2px;
            background-color: #f0f7ff; border-left: 4px solid #3b82f6;
        }
        .discipline-card.custom { background-color: #fff1f2; border-left-color: #f43f5e; }
        .discipline-card.ead { background-color: #f0fdf4; border-left-color: #22c55e; }

        .btn-delete-cell {
            position: absolute; top: -2px; right: -2px; width: 20px; height: 20px;
            background: #ef4444; color: white; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; z-index: 30; border: 2px solid white;
        }
        .mode-free .discipline-card:hover .btn-delete-cell { display: flex; }
        
        @media (max-width: 768px) {
            .mode-free .btn-delete-cell { display: flex; }
        }

        /* Classes para a imagem final */
        .export-mode .btn-delete-cell { display: none !important; }
        .export-mode { border-radius: 0 !important; }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(8px); 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            padding: 1rem; 
        }
        .modal.active { display: flex; }
        
        .active-mode { 
            background-color: #3b82f6 !important; 
            color: white !important; 
        }
    </style>
</head>
<body class="p-3 md:p-6">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-6 md:mb-8 gap-6 bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4 w-full lg:w-auto">
                <div id="dbStatus" class="w-3 h-3 rounded-full bg-slate-300 ring-4 ring-slate-50 transition-all"></div>
                <div class="flex-1">
                    <h1 class="text-xl md:text-2xl font-black text-slate-900 tracking-tight">UEM Bio <span class="text-blue-600">Cloud</span></h1>
                    <div class="flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-700 text-[9px] px-2 py-0.5 rounded-full font-bold">STABLE v2.5</span>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">2026</p>
                    </div>
                </div>
                <div class="lg:hidden flex gap-2">
                    <button onclick="downloadSchedule()" class="p-2.5 bg-green-50 text-green-600 rounded-xl" id="btnCaptureMobile">📸</button>
                    <button onclick="limparGradeCompleta()" class="p-2.5 bg-red-50 text-red-600 rounded-xl">🗑️</button>
                </div>
            </div>
            
            <nav class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl overflow-x-auto w-full lg:w-auto scrollbar-hide">
                <button id="btnView" onclick="setAppMode('view')" class="btn-toggle active-mode px-4 py-2.5 rounded-xl font-bold text-[10px] md:text-[11px] uppercase transition-all whitespace-nowrap flex-1">Visualizar</button>
                <button id="btnFree" onclick="setAppMode('free')" class="btn-toggle text-slate-500 hover:bg-white px-4 py-2.5 rounded-xl font-bold text-[10px] md:text-[11px] uppercase transition-all whitespace-nowrap flex-1">Customizar</button>
                <button onclick="openSmartImport()" class="text-slate-500 hover:bg-white px-4 py-2.5 rounded-xl font-bold text-[10px] md:text-[11px] uppercase transition-all whitespace-nowrap flex-1">Importar</button>
            </nav>

            <div class="hidden lg:flex gap-2 flex-wrap justify-center">
                <button onclick="downloadSchedule()" id="btnDownloadDesktop" class="bg-green-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs hover:bg-green-700 transition-all flex items-center gap-2">📸 Baixar Grade</button>
                <button onclick="openModal('modalSheet')" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-xs hover:bg-slate-800 transition-all">📋 Grade Mestra</button>
            </div>
        </header>

        <div id="capture-area" class="bg-white rounded-3xl shadow-xl p-2 md:p-6 border border-slate-100">
            <div class="grid-scroll-wrapper" id="grid-container">
                <div class="timetable-grid" id="grid">
                    <div class="cell header">Horário</div>
                    <div class="cell header">Segunda</div>
                    <div class="cell header">Terça</div>
                    <div class="cell header">Quarta</div>
                    <div class="cell header">Quinta</div>
                    <div class="cell header">Sexta</div>
                </div>
            </div>
        </div>
        
        <!-- Rodapé Invisível que só aparece na captura -->
        <div id="capture-footer" class="hidden text-center p-4 bg-white">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gerado em uem-bio-cloud.web.app • 2026</p>
        </div>
    </div>

    <!-- Modais -->
    <div id="modalSelect" class="modal"><div class="modal-content bg-white rounded-3xl w-full max-w-xl overflow-hidden flex flex-col max-h-[90vh]"><div class="p-5 border-b flex justify-between items-center bg-slate-50"><h3 id="modalTitle" class="font-black text-slate-800 uppercase text-sm">Ação</h3><button onclick="closeModal('modalSelect')" class="w-8 h-8 flex items-center justify-center bg-slate-200 rounded-full text-slate-600 text-xs">✕</button></div><div class="p-4 bg-white sticky top-0 z-10"><input type="text" id="searchInput" placeholder="Busque disciplina..." class="w-full bg-slate-50 border-2 border-transparent rounded-2xl px-5 py-4 focus:border-blue-500 outline-none font-medium text-sm" oninput="filterDisciplines()"></div><div id="disciplinesList" class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[300px]"></div><div class="p-5 border-t bg-slate-50 flex gap-3"><button id="btnRemoveCell" onclick="removeSelection()" class="px-4 py-3 bg-red-50 text-red-500 rounded-xl text-[10px] font-black uppercase">Remover</button><button onclick="closeModal('modalSelect')" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-bold text-xs uppercase">Fechar</button></div></div></div>
    <div id="modalCustom" class="modal"><div class="modal-content bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl"><h3 class="font-black text-slate-800 text-xl mb-6 tracking-tight">Personalizado</h3><div class="space-y-4"><input type="text" id="customNome" placeholder="NOME DA ATIVIDADE" class="w-full bg-slate-50 rounded-2xl px-4 py-4 outline-none font-bold uppercase text-sm border-2 border-transparent focus:border-blue-500"><div class="grid grid-cols-2 gap-4"><input type="text" id="customCodigo" placeholder="CÓDIGO" class="bg-slate-50 rounded-2xl px-4 py-4 outline-none text-sm uppercase"><input type="text" id="customTurma" placeholder="TURMA" class="bg-slate-50 rounded-2xl px-4 py-4 outline-none text-sm uppercase"></div><div class="grid grid-cols-2 gap-4"><input type="text" id="customBloco" placeholder="BLOCO" class="bg-slate-50 rounded-2xl px-4 py-4 outline-none text-sm uppercase"><input type="text" id="customSala" placeholder="SALA" class="bg-slate-50 rounded-2xl px-4 py-4 outline-none text-sm uppercase"></div></div><div class="flex gap-3 mt-8"><button onclick="closeModal('modalCustom')" class="px-6 py-5 bg-slate-100 text-slate-500 rounded-2xl font-bold text-xs uppercase">Sair</button><button onclick="saveCustomDiscipline()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black text-xs uppercase hover:bg-blue-700">Salvar</button></div></div></div>
    <div id="modalSheet" class="modal"><div class="modal-content bg-white rounded-3xl w-full max-w-5xl overflow-hidden flex flex-col max-h-[90vh]"><div class="p-6 bg-slate-900 text-white flex justify-between items-center"><h2 class="font-black">Catálogo 2026</h2><button onclick="closeModal('modalSheet')" class="w-8 h-8 flex items-center justify-center bg-white/10 rounded-full">✕</button></div><div class="overflow-auto p-4"><table class="w-full text-left border-collapse"><thead class="sticky top-0 bg-white border-b"><tr class="text-[10px] font-black text-slate-400 uppercase"><th class="p-4">Cód</th><th class="p-4">Disciplina</th><th class="p-4">Local</th></tr></thead><tbody id="fullSheetBody" class="divide-y"></tbody></table></div></div></div>

    <script>
        const STORAGE_KEY = 'uem_bio_cloud_2026_data';
        const horarios = [
            { label: "07:45 - 08:35", start: 465, end: 515 }, { label: "08:35 - 09:25", start: 515, end: 565 },
            { label: "09:40 - 10:30", start: 580, end: 630 }, { label: "10:30 - 11:20", start: 630, end: 680 },
            { label: "11:20 - 12:10", start: 680, end: 730 }, { label: "13:30 - 14:20", start: 810, end: 860 },
            { label: "14:20 - 15:10", start: 860, end: 910 }, { label: "15:20 - 16:10", start: 920, end: 970 },
            { label: "16:10 - 17:00", start: 970, end: 1020 }, { label: "17:00 - 17:50", start: 1020, end: 1070 }
        ];

        const diasMap = { "Segunda": 1, "Terça": 2, "Quarta": 3, "Quinta": 4, "Sexta": 5 };
        let appMode = 'view', smartImportActive = false, selectedCellId = null;
        let scheduleData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

        const timeToMinutes = (t) => { const p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); };
        const normalize = (t) => t ? t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : "";

        window.initGrid = () => {
            const grid = document.getElementById('grid');
            const currentHeaders = Array.from(grid.querySelectorAll('.header'));
            grid.innerHTML = '';
            currentHeaders.forEach(h => grid.appendChild(h));

            horarios.forEach((hObj, rIdx) => {
                const label = document.createElement('div');
                label.className = 'cell time-label';
                label.innerText = hObj.label;
                grid.appendChild(label);
                for (let d = 1; d <= 5; d++) {
                    const id = `${d}-${rIdx}`;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = id;
                    cell.onclick = (e) => handleCellClick(e, id);
                    renderCellContent(cell, id);
                    grid.appendChild(cell);
                }
            });
            renderFullSheet();
        };

        function setAppMode(mode) {
            appMode = mode;
            document.getElementById('capture-area').classList.toggle('mode-free', mode === 'free');
            document.getElementById('btnView').classList.toggle('active-mode', mode === 'view');
            document.getElementById('btnFree').classList.toggle('active-mode', mode === 'free');
            window.initGrid();
        }

        function handleCellClick(e, id) {
            if (appMode !== 'free' || e.target.classList.contains('btn-delete-cell')) return;
            smartImportActive = false;
            selectedCellId = id;
            document.getElementById('modalTitle').innerText = "Vincular";
            document.getElementById('btnRemoveCell').style.display = 'block';
            openModal('modalSelect');
            filterDisciplines();
        }

        function renderCellContent(cell, id) {
            const data = scheduleData[id];
            if (!data) return;
            const d = data.customData || window.disciplinasGlobal.find(i => i.id === data.disciplineId);
            if (!d) return;
            const isEad = normalize(d.bloco).includes('ead') || normalize(d.sala).includes('ead');
            cell.innerHTML = `
                <div class="discipline-card ${d.isCustom ? 'custom' : (isEad ? 'ead' : '')}">
                    <div class="btn-delete-cell" onclick="deleteCell('${id}')">✕</div>
                    <div class="font-black ${isEad ? 'text-green-600' : 'text-blue-600'} text-[7.5px] tracking-tighter uppercase">${d.codigo}</div>
                    <div class="font-bold text-slate-800 uppercase text-[8.5px] my-0.5 leading-tight">${d.nome}</div>
                    <div class="text-[7.5px] text-slate-400 font-bold uppercase tracking-tighter">${d.bloco || '-'}/${d.sala || '-'}</div>
                </div>`;
        }

        function filterDisciplines() {
            const term = normalize(document.getElementById('searchInput').value);
            const list = document.getElementById('disciplinesList');
            list.innerHTML = '';
            if (!smartImportActive) {
                const cBtn = document.createElement('div');
                cBtn.className = "p-4 bg-blue-50 border-2 border-dashed border-blue-200 rounded-2xl cursor-pointer mb-2";
                cBtn.innerHTML = `<div class="font-black text-blue-600 text-[9px] uppercase">Novo Item</div><div class="text-xs font-bold text-blue-900">Personalizar...</div>`;
                cBtn.onclick = () => { closeModal('modalSelect'); openModal('modalCustom'); };
                list.appendChild(cBtn);
            }
            window.disciplinasGlobal.filter(d => normalize(d.nome).includes(term) || normalize(d.codigo).includes(term)).forEach(d => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white border-2 border-slate-100 rounded-2xl cursor-pointer";
                div.innerHTML = `<div class="flex justify-between text-[9px] font-black uppercase mb-1"><span class="text-blue-600">${d.codigo}</span><span class="text-slate-400">Turma ${d.turma}</span></div><div class="font-bold text-slate-800 text-xs uppercase mb-1">${d.nome}</div><div class="text-[9px] text-slate-400">${d.dia} • ${d.horario}</div>`;
                div.onclick = () => { if (smartImportActive) applySmartImport(d.codigo, d.turma); else scheduleData[selectedCellId] = { disciplineId: d.id }; saveAndRefresh(); closeModal('modalSelect'); };
                list.appendChild(div);
            });
        }

        function applySmartImport(cod, tur) {
            window.disciplinasGlobal.filter(d => d.codigo === cod && d.turma === tur).forEach(m => {
                const dayIdx = diasMap[m.dia];
                const [start, end] = m.horario.split(' às ').map(timeToMinutes);
                horarios.forEach((h, rIdx) => { if (Math.min(h.end, end) - Math.max(h.start, start) >= 10) scheduleData[`${dayIdx}-${rIdx}`] = { disciplineId: m.id }; });
            });
        }

        function saveCustomDiscipline() {
            const n = document.getElementById('customNome').value.trim();
            if(!n) return;
            const obj = { id: 'c-'+Date.now(), nome: n.toUpperCase(), codigo: document.getElementById('customCodigo').value.toUpperCase() || 'EXTRA', turma: document.getElementById('customTurma').value || '-', bloco: document.getElementById('customBloco').value || '-', sala: document.getElementById('customSala').value || '-', isCustom: true };
            scheduleData[selectedCellId] = { disciplineId: obj.id, customData: obj };
            saveAndRefresh(); closeModal('modalCustom');
        }

        function openSmartImport() { smartImportActive = true; document.getElementById('modalTitle').innerText = "Importar Grade"; openModal('modalSelect'); filterDisciplines(); }
        function saveAndRefresh() { localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData)); window.initGrid(); }
        function deleteCell(id) { delete scheduleData[id]; saveAndRefresh(); }
        function limparGradeCompleta() { if(confirm("Limpar tudo?")) { scheduleData = {}; saveAndRefresh(); } }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function removeSelection() { delete scheduleData[selectedCellId]; saveAndRefresh(); closeModal('modalSelect'); }

        function renderFullSheet() {
            const b = document.getElementById('fullSheetBody');
            if(!b) return;
            b.innerHTML = window.disciplinasGlobal.slice(0, 50).map(d => `<tr class="text-[11px] uppercase"><td class="p-4 font-black text-blue-600">${d.codigo}</td><td class="p-4 font-bold">${d.nome}</td><td class="p-4 text-slate-400">${d.bloco}/${d.sala}</td></tr>`).join('');
        }

        // --- SOLUÇÃO DEFINITIVA DE CAPTURA (CLONAGEM E ESTATIZAÇÃO) ---
        async function downloadSchedule() {
            const grid = document.getElementById('grid');
            const footer = document.getElementById('capture-footer');
            const btnMobile = document.getElementById('btnCaptureMobile');
            
            // 1. Feedback Visual
            const originalBtnIcon = btnMobile.innerHTML;
            btnMobile.innerHTML = "⏳";
            
            try {
                // 2. Criação do Clone para Captura (Fora do viewport e sem scroll)
                const cloneContainer = document.createElement('div');
                cloneContainer.style.position = 'absolute';
                cloneContainer.style.top = '-9999px';
                cloneContainer.style.left = '-9999px';
                cloneContainer.style.width = '1200px'; // Largura total garantida
                cloneContainer.style.backgroundColor = 'white';
                cloneContainer.style.padding = '40px';
                cloneContainer.classList.add('export-mode');

                // Título no Print
                const title = document.createElement('h2');
                title.innerHTML = "UEM BIO CLOUD <span style='color:#3b82f6'>2026</span>";
                title.style.fontFamily = 'Inter, sans-serif';
                title.style.fontWeight = '900';
                title.style.marginBottom = '20px';
                title.style.textAlign = 'center';
                cloneContainer.appendChild(title);

                // Clone da Grade
                const clonedGrid = grid.cloneNode(true);
                clonedGrid.style.minWidth = '1120px'; // Garante que a tabela não esprema no clone
                cloneContainer.appendChild(clonedGrid);

                // Adiciona o rodapé ao clone
                const clonedFooter = footer.cloneNode(true);
                clonedFooter.classList.remove('hidden');
                cloneContainer.appendChild(clonedFooter);

                document.body.appendChild(cloneContainer);

                // 3. Captura o Clone
                const canvas = await html2canvas(cloneContainer, {
                    scale: 2, // Escala 2 é o equilíbrio perfeito entre qualidade e memória no mobile
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    logging: false,
                    allowTaint: true
                });

                // 4. Download
                const link = document.createElement('a');
                link.download = `Grade-UEM-Bio-2026.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.85);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // 5. Limpeza
                document.body.removeChild(cloneContainer);

            } catch (err) {
                console.error("Erro fatal na captura:", err);
                alert("Falha ao gerar imagem no telemóvel. Tente usar o navegador Chrome ou tirar um print.");
            } finally {
                btnMobile.innerHTML = originalBtnIcon;
            }
        }

        window.onload = () => { if(window.disciplinasGlobal.length > 0) window.initGrid(); };
    </script>
</body>
</html>
